<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Pulse - Arcade Survival</title>
    <style>
        /* ============================================ */
        /* SECTION: CSS STYLES                          */
        /* ============================================ */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050510;
            overflow: hidden;
            touch-action: none; /* Prevent pinch zoom, scroll on mobile */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        #uiLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            background: rgba(5, 5, 16, 0.85);
            padding: 40px 60px;
            border-radius: 20px;
            border: 2px solid #0ff;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.2);
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }

        .active-screen {
            display: flex;
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        h1 {
            color: #fff;
            font-size: clamp(3rem, 8vw, 5rem);
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 6px;
            text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #0ff;
        }

        p {
            color: #aaa;
            font-size: clamp(1rem, 3vw, 1.2rem);
            margin-bottom: 30px;
            line-height: 1.5;
            max-width: 400px;
        }

        .highlight {
            color: #0ff;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
        }

        .danger {
            color: #ff0055;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 0, 85, 0.5);
        }

        button {
            background: rgba(0, 255, 255, 0.1);
            color: #0ff;
            border: 2px solid #0ff;
            padding: 15px 50px;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2) inset, 0 0 15px rgba(0, 255, 255, 0.2);
            font-family: inherit;
            font-weight: bold;
            outline: none;
            width: 100%;
            max-width: 300px;
        }

        button:hover, button:active {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6) inset, 0 0 40px rgba(0, 255, 255, 0.6);
            transform: scale(1.05);
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            padding: 0 30px;
            box-sizing: border-box;
            color: #fff;
            pointer-events: none;
            display: none;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 5;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.1);
        }

        .stat-label {
            font-size: 0.8rem;
            color: #0ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 10px #0ff;
            line-height: 1;
        }

        #levelBadge {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 255, 255, 0.2);
            padding: 5px 15px;
            border: 1px solid #0ff;
            border-radius: 20px;
            color: #0ff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: none;
            z-index: 5;
        }

        #mobileControlsHint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
            letter-spacing: 1px;
            pointer-events: none;
            display: none;
            animation: pulseText 2s infinite;
        }

        @keyframes pulseText {
            0% { opacity: 0.3; }
            50% { opacity: 0.8; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <!-- ============================================ -->
    <!-- SECTION: HTML STRUCTURE                      -->
    <!-- ============================================ -->
    <canvas id="gameCanvas"></canvas>
    
    <div id="hud">
        <div class="stat-box">
            <span class="stat-label">Score</span>
            <span class="stat-value" id="scoreDisplay">0</span>
        </div>
        <div id="levelBadge">Lvl 1</div>
        <div class="stat-box" style="align-items: flex-end;">
            <span class="stat-label">Best</span>
            <span class="stat-value" id="highScoreDisplay">0</span>
        </div>
    </div>

    <div id="mobileControlsHint">Drag anywhere to move</div>

    <div id="uiLayer">
        <!-- Start Screen -->
        <div id="mainMenu" class="screen active-screen">
            <h1>Neon Pulse</h1>
            <p>Guide your core. Collect <span class="highlight">Energy Orbs</span>. Avoid <span class="danger">Red Geometry</span>. Survive as long as you can.</p>
            <button id="playBtn">Play Game</button>
        </div>

        <!-- Pause Screen -->
        <div id="pauseScreen" class="screen">
            <h1>Paused</h1>
            <p>Take a breath. The swarm awaits.</p>
            <button id="resumeBtn" style="margin-bottom: 20px;">Resume</button>
            <button id="quitBtn" style="background: transparent; color: #aaa; border-color: #555; box-shadow: none;">Quit to Menu</button>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="screen">
            <h1 style="color: #ff0055; text-shadow: 0 0 20px #ff0055;">Core Breached</h1>
            <p id="finalScoreText" style="font-size: 1.5rem; color: #fff; margin-bottom: 10px;">Final Score: 0</p>
            <p id="survivalTimeText" style="margin-bottom: 20px;">Survived for 0s</p>
            <h2 id="newHighScoreMsg" style="color:#0ff; display:none; margin: 0 0 25px 0; text-shadow: 0 0 15px #0ff; text-transform: uppercase; font-size: 1.2rem; letter-spacing: 2px;">★ New High Score! ★</h2>
            <button id="restartBtn" style="margin-bottom: 20px;">Play Again</button>
            <button id="menuBtn" style="background: transparent; color: #aaa; border-color: #555; box-shadow: none;">Main Menu</button>
        </div>
    </div>

    <script>
        /**
         * ============================================
         * SECTION: JAVASCRIPT — CONFIGURATION
         * ============================================
         */
        const CONFIG = {
            PLAYER_RADIUS: 14,
            PLAYER_SPEED: 0.12,
            ENEMY_SPAWN_RATE_INITIAL: 1200,
            ENEMY_SPAWN_RATE_MIN: 250,
            ENEMY_BASE_SPEED: 2.5,
            COLLECTIBLE_SPAWN_RATE: 2500,
            POWERUP_SPAWN_RATE: 8000,
            BOSS_SPAWN_SCORE: 2000,
            SCORE_PER_ORB: 100,
            COLORS: {
                bg: '#050510',
                grid: 'rgba(0, 255, 255, 0.05)',
                player: '#00ffff',
                playerCore: '#ffffff',
                enemy: '#ff0055',
                enemyFill: 'rgba(255, 0, 85, 0.2)',
                collectible: '#00ffaa',
                particleTrail: 'rgba(0, 255, 255, 0.4)',
                powerupShield: '#fffb00',
                powerupBlast: '#ff8800',
                powerupSpeed: '#00ff00',
                boss: '#ff00ff'
            }
        };

        /**
         * ============================================
         * SECTION: JAVASCRIPT — UTILITY FUNCTIONS
         * ============================================
         */
        const Utils = {
            distance: (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1),
            random: (min, max) => Math.random() * (max - min) + min,
            randomInt: (min, max) => Math.floor(Math.random() * (max - min + 1)) + min,
            lerp: (start, end, amt) => (1 - amt) * start + amt * end,
            saveScore: (score) => {
                try {
                    const high = localStorage.getItem('neonPulseHigh');
                    if (!high || score > parseInt(high, 10)) {
                        localStorage.setItem('neonPulseHigh', score.toString());
                        return true;
                    }
                } catch(e) { /* Ignore Safari private mode errors */ }
                return false;
            },
            getHighScore: () => {
                try {
                    return parseInt(localStorage.getItem('neonPulseHigh'), 10) || 0;
                } catch(e) { return 0; }
            },
            formatTime: (ms) => {
                const totalSeconds = Math.floor(ms / 1000);
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                return `${minutes > 0 ? minutes + 'm ' : ''}${seconds}s`;
            },
            isMobile: () => /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
        };

        /**
         * ============================================
         * SECTION: JAVASCRIPT — AUDIO ENGINE
         * ============================================
         */
        const AudioEngine = (function() {
            let ctx = null;
            let enabled = false;

            function init() {
                if (ctx) return;
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    ctx = new AudioContext();
                    enabled = true;
                } catch (e) {
                    console.warn('Web Audio API not supported');
                }
            }

            function playSound(type) {
                if (!enabled || !ctx) return;
                if (ctx.state === 'suspended') ctx.resume();

                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.connect(gain);
                gain.connect(ctx.destination);

                const now = ctx.currentTime;

                if (type === 'collect') {
                    // Sweet chime
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, now);
                    osc.frequency.exponentialRampToValueAtTime(1760, now + 0.1);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now);
                    osc.stop(now + 0.2);
                } else if (type === 'explosion') {
                    // Deep crunch / impact
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(10, now + 0.4);
                    gain.gain.setValueAtTime(0.5, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    
                    // Add noise component for better explosion
                    const bufferSize = ctx.sampleRate * 0.4;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = Math.random() * 2 - 1;
                    }
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    const noiseFilter = ctx.createBiquadFilter();
                    noiseFilter.type = 'lowpass';
                    noiseFilter.frequency.setValueAtTime(1000, now);
                    noiseFilter.frequency.exponentialRampToValueAtTime(100, now + 0.3);
                    const noiseGain = ctx.createGain();
                    noiseGain.gain.setValueAtTime(0.4, now);
                    noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    
                    noise.connect(noiseFilter);
                    noiseFilter.connect(noiseGain);
                    noiseGain.connect(ctx.destination);
                    
                    noise.start(now);
                    osc.start(now);
                    osc.stop(now + 0.4);
                } else if (type === 'start') {
                    // Upward sweep
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(220, now);
                    osc.frequency.linearRampToValueAtTime(880, now + 0.3);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                }
            }

            return { init, playSound };
        })();

        /**
         * ============================================
         * SECTION: JAVASCRIPT — MAIN GAME LOOP
         * ============================================
         */
        const Game = (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d', { alpha: false });
            
            let width, height;
            let state = 'menu'; // menu, playing, paused, gameover
            let lastTime = 0;
            let animationFrameId;
            
            // Game State
            let score = 0;
            let totalPlayTime = 0;
            let difficultyMult = 1;
            
            // Camera / Shake
            let shakeTime = 0;
            let shakeIntensity = 0;

            // Pools & Entities
            let player = { 
                x: 0, y: 0, 
                targetX: 0, targetY: 0, 
                radius: CONFIG.PLAYER_RADIUS,
                shield: 0,
                blastReady: false,
                level: 1,
                xp: 0,
                xpToNext: 5,
                speedBoost: 0,
                baseSpeed: CONFIG.PLAYER_SPEED
            };
            let enemies = [];
            let collectibles = [];
            let powerups = [];
            let particles = [];
            let boss = null;
            
            // Spawning Timers
            let enemyTimer = 0;
            let collectibleTimer = 0;
            let powerupTimer = 0;
            let bossSpawned = false;

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                
                if (state === 'menu') {
                    player.x = width / 2;
                    player.y = height / 2;
                    player.targetX = width / 2;
                    player.targetY = height / 2;
                    spawnBackgroundDecorations();
                }
            }

            function spawnBackgroundDecorations() {
                enemies = [];
                for(let i=0; i<15; i++) {
                    enemies.push(createEnemy(Utils.random(0, width), Utils.random(0, height), true));
                }
            }

            /**
             * ============================================
             * SECTION: JAVASCRIPT — INPUT HANDLING
             * ============================================
             */
            function initInput() {
                window.addEventListener('resize', resize);
                
                const setTarget = (clientX, clientY) => {
                    if (state !== 'playing') return;
                    player.targetX = clientX;
                    player.targetY = clientY;
                };

                // Mouse
                window.addEventListener('mousemove', (e) => setTarget(e.clientX, e.clientY));
                
                // Touch - prevent default to stop scrolling/zooming
                window.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    if(e.touches.length > 0) setTarget(e.touches[0].clientX, e.touches[0].clientY);
                }, { passive: false });
                
                window.addEventListener('touchstart', (e) => {
                    if(state === 'playing' && e.touches.length > 0) {
                        setTarget(e.touches[0].clientX, e.touches[0].clientY);
                    }
                }, { passive: false });

                // Keyboard
                window.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' || e.key === 'p' || e.key === 'P') {
                        if (state === 'playing') pauseGame();
                        else if (state === 'paused') resumeGame();
                    }
                });

                if (Utils.isMobile()) {
                    document.getElementById('mobileControlsHint').style.display = 'block';
                }
            }

            /**
             * ============================================
             * SECTION: JAVASCRIPT — GAME ENTITIES
             * ============================================
             */
            function createEnemy(x, y, isDecorative = false, type = 'normal') {
                const size = type === 'boss' ? 60 : Utils.randomInt(12, 22);
                let speed = isDecorative ? Utils.random(0.5, 1) : CONFIG.ENEMY_BASE_SPEED * difficultyMult * Utils.random(0.8, 1.3);
                if (type === 'boss') speed *= 0.4;
                
                return {
                    x: x, 
                    y: y, 
                    radius: size, 
                    speed: speed, 
                    angle: Utils.random(0, Math.PI * 2), 
                    rotSpeed: Utils.random(-0.1, 0.1),
                    vertices: type === 'boss' ? 8 : Utils.randomInt(3, 5),
                    isDecorative: isDecorative,
                    type: type,
                    health: type === 'boss' ? 10 : 1
                };
            }

            function spawnBoss() {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.max(width, height) / 2 + 100;
                const bx = width/2 + Math.cos(angle) * dist;
                const by = height/2 + Math.sin(angle) * dist;
                boss = createEnemy(bx, by, false, 'boss');
                bossSpawned = true;
                AudioEngine.playSound('start'); // Boss alert sound
            }

            function spawnEnemy() {
                // Spawn just outside the viewport
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.max(width, height) / 2 + 50;
                const ex = width/2 + Math.cos(angle) * dist;
                const ey = height/2 + Math.sin(angle) * dist;
                
                enemies.push(createEnemy(ex, ey));
            }

            function spawnCollectible() {
                collectibles.push({
                    x: Utils.random(50, width - 50),
                    y: Utils.random(50, height - 50),
                    radius: 8,
                    life: 6000, // 6 seconds before disappearing
                    maxLife: 6000
                });
            }

            function spawnPowerup() {
                const types = ['shield', 'blast', 'speed'];
                const type = types[Math.floor(Math.random() * types.length)];
                powerups.push({
                    x: Utils.random(100, width - 100),
                    y: Utils.random(100, height - 100),
                    radius: 12,
                    type: type,
                    life: 8000,
                    maxLife: 8000,
                    color: type === 'shield' ? CONFIG.COLORS.powerupShield : (type === 'blast' ? CONFIG.COLORS.powerupBlast : CONFIG.COLORS.powerupSpeed)
                });
            }

            /**
             * ============================================
             * SECTION: JAVASCRIPT — PARTICLE SYSTEM
             * ============================================
             */
            function createExplosion(x, y, color, count, speedMult = 1) {
                for(let i=0; i<count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Utils.random(1, 6) * speedMult;
                    particles.push({
                        x: x, y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        radius: Utils.random(2, 5),
                        color: color,
                        life: 1,
                        decay: Utils.random(0.015, 0.04)
                    });
                }
            }

            function createTrail(x, y) {
                particles.push({
                    x: x + Utils.random(-5, 5), 
                    y: y + Utils.random(-5, 5),
                    vx: 0, vy: 0,
                    radius: Utils.random(2, 4),
                    color: CONFIG.COLORS.particleTrail,
                    life: 0.5,
                    decay: 0.05
                });
            }

            /**
             * ============================================
             * SECTION: JAVASCRIPT — GAME STATE MANAGEMENT
             * ============================================
             */
            function start() {
                AudioEngine.init();
                AudioEngine.playSound('start');
                
                score = 0;
                totalPlayTime = 0;
                difficultyMult = 1;
                enemies = [];
                collectibles = [];
                powerups = [];
                particles = [];
                boss = null;
                bossSpawned = false;
                
                // Start player in center
                player.x = width / 2;
                player.y = height / 2;
                player.targetX = width / 2;
                player.targetY = height / 2;
                player.shield = 0;
                player.blastReady = false;
                player.level = 1;
                player.xp = 0;
                player.xpToNext = 5;
                player.radius = CONFIG.PLAYER_RADIUS;
                player.speedBoost = 0;
                player.baseSpeed = CONFIG.PLAYER_SPEED;
                
                updateScoreUI();
                document.getElementById('highScoreDisplay').innerText = Utils.getHighScore();
                
                showScreen(null);
                document.getElementById('hud').style.display = 'flex';
                if(Utils.isMobile()) document.getElementById('mobileControlsHint').style.display = 'block';
                
                state = 'playing';
                lastTime = performance.now();
                if (!animationFrameId) animationFrameId = requestAnimationFrame(gameLoop);
            }

            function pauseGame() {
                state = 'paused';
                showScreen('pauseScreen');
                document.getElementById('hud').style.opacity = '0.5';
            }

            function resumeGame() {
                state = 'playing';
                showScreen(null);
                document.getElementById('hud').style.opacity = '1';
                lastTime = performance.now();
                animationFrameId = requestAnimationFrame(gameLoop);
            }

            function gameOver() {
                state = 'gameover';
                AudioEngine.playSound('explosion');
                createExplosion(player.x, player.y, CONFIG.COLORS.player, 80, 2);
                shakeTime = 600;
                shakeIntensity = 20;
                
                const isHigh = Utils.saveScore(score);
                document.getElementById('finalScoreText').innerText = `Final Score: ${score}`;
                document.getElementById('survivalTimeText').innerText = `Survived for ${Utils.formatTime(totalPlayTime)}`;
                document.getElementById('newHighScoreMsg').style.display = isHigh && score > 0 ? 'block' : 'none';
                
                document.getElementById('hud').style.display = 'none';
                document.getElementById('mobileControlsHint').style.display = 'none';
                
                // Slight delay before showing menu so player sees explosion
                setTimeout(() => {
                    showScreen('gameOverScreen');
                }, 1200);
            }

            function showScreen(id) {
                document.querySelectorAll('.screen').forEach(el => el.classList.remove('active-screen'));
                if (id) document.getElementById(id).classList.add('active-screen');
            }

            function updateScoreUI() {
                document.getElementById('scoreDisplay').innerText = score;
                const badge = document.getElementById('levelBadge');
                badge.innerText = `Lvl ${player.level}`;
                badge.style.display = 'block';
            }

            /**
             * ============================================
             * SECTION: JAVASCRIPT — UPDATE LOGIC
             * ============================================
             */
            function update(dt) {
                // Background animation in menu
                if (state === 'menu') {
                    enemies.forEach(e => {
                        e.angle += e.rotSpeed;
                        e.x += Math.cos(e.angle) * e.speed * (dt/16);
                        e.y += Math.sin(e.angle) * e.speed * (dt/16);
                        // Wrap around
                        if(e.x < -50) e.x = width + 50;
                        if(e.x > width + 50) e.x = -50;
                        if(e.y < -50) e.y = height + 50;
                        if(e.y > height + 50) e.y = -50;
                    });
                    return;
                }

                if (state !== 'playing' && state !== 'gameover') return;

                // Screen Shake decay
                if (shakeTime > 0) shakeTime -= dt;

                if (state === 'playing') {
                    totalPlayTime += dt;
                    // Increase difficulty over time: 10% faster every 15 seconds
                    difficultyMult = 1 + (totalPlayTime / 15000) * 0.15;

                    // Update player powers
                    if (player.shield > 0) player.shield -= dt;
                    if (player.speedBoost > 0) player.speedBoost -= dt;

                    // Move Player smoothly towards target
                    const dxPlayer = player.targetX - player.x;
                    const dyPlayer = player.targetY - player.y;
                    
                    const currentSpeed = player.speedBoost > 0 ? player.baseSpeed * 1.5 : player.baseSpeed;
                    player.x += dxPlayer * currentSpeed * (dt/16);
                    player.y += dyPlayer * currentSpeed * (dt/16);
                    
                    // Emit trail if moving fast enough
                    if (Math.hypot(dxPlayer, dyPlayer) > 5 && Math.random() > 0.5) {
                        createTrail(player.x, player.y);
                    }
                    
                    // Constrain player to screen bounds
                    player.x = Math.max(player.radius, Math.min(width - player.radius, player.x));
                    player.y = Math.max(player.radius, Math.min(height - player.radius, player.y));

                    // Hide mobile hint once player moves
                    if (totalPlayTime > 2000 && Math.hypot(dxPlayer, dyPlayer) > 10) {
                        document.getElementById('mobileControlsHint').style.display = 'none';
                    }

                    // Spawning Logic
                    enemyTimer += dt;
                    const currentSpawnRate = Math.max(CONFIG.ENEMY_SPAWN_RATE_MIN, CONFIG.ENEMY_SPAWN_RATE_INITIAL / difficultyMult);
                    if (enemyTimer > currentSpawnRate) {
                        spawnEnemy();
                        enemyTimer = 0;
                    }

                    collectibleTimer += dt;
                    if (collectibleTimer > CONFIG.COLLECTIBLE_SPAWN_RATE) {
                        spawnCollectible();
                        collectibleTimer = 0;
                    }

                    powerupTimer += dt;
                    if (powerupTimer > CONFIG.POWERUP_SPAWN_RATE) {
                        spawnPowerup();
                        powerupTimer = 0;
                    }

                    // Powerups Logic
                    for (let i = powerups.length - 1; i >= 0; i--) {
                        let p = powerups[i];
                        p.life -= dt;
                        if (p.life <= 0) {
                            powerups.splice(i, 1);
                            continue;
                        }
                        if (Utils.distance(player.x, player.y, p.x, p.y) < player.radius + p.radius) {
                            if (p.type === 'shield') {
                                player.shield = 5000; // 5 seconds shield
                                AudioEngine.playSound('collect');
                            } else if (p.type === 'speed') {
                                player.speedBoost = 5000; // 5 seconds speed boost
                                AudioEngine.playSound('collect');
                            } else if (p.type === 'blast') {
                                // Clear nearby enemies
                                enemies.forEach((e, idx) => {
                                    if (Utils.distance(player.x, player.y, e.x, e.y) < 300) {
                                        createExplosion(e.x, e.y, CONFIG.COLORS.enemy, 10);
                                        e.toRemove = true;
                                    }
                                });
                                enemies = enemies.filter(e => !e.toRemove);
                                AudioEngine.playSound('explosion');
                                shakeTime = 300;
                                shakeIntensity = 10;
                            }
                            createExplosion(p.x, p.y, p.color, 20);
                            powerups.splice(i, 1);
                        }
                    }

                    // Collectibles Logic
                    for (let i = collectibles.length - 1; i >= 0; i--) {
                        let c = collectibles[i];
                        c.life -= dt;
                        
                        if (c.life <= 0) {
                            // Fade out particle effect
                            createExplosion(c.x, c.y, '#555', 5, 0.5);
                            collectibles.splice(i, 1);
                            continue;
                        }
                        
                        // Collision with player
                        if (Utils.distance(player.x, player.y, c.x, c.y) < player.radius + c.radius) {
                            score += CONFIG.SCORE_PER_ORB;
                            player.xp++;
                            if (player.xp >= player.xpToNext) {
                                player.level++;
                                player.xp = 0;
                                player.xpToNext = Math.floor(player.xpToNext * 1.5);
                                player.radius = Math.min(30, player.radius + 1);
                                createExplosion(player.x, player.y, CONFIG.COLORS.player, 30);
                            }
                            updateScoreUI();
                            AudioEngine.playSound('collect');
                            createExplosion(c.x, c.y, CONFIG.COLORS.collectible, 15);
                            collectibles.splice(i, 1);
                        }
                    }

                    // Boss Logic
                    if (score >= CONFIG.BOSS_SPAWN_SCORE && !bossSpawned) {
                        spawnBoss();
                    }

                    if (boss) {
                        const bdx = player.x - boss.x;
                        const bdy = player.y - boss.y;
                        const bdist = Math.hypot(bdx, bdy);
                        boss.x += (bdx / bdist) * boss.speed * (dt/16);
                        boss.y += (bdy / bdist) * boss.speed * (dt/16);
                        boss.angle += boss.rotSpeed * (dt/16);

                        if (bdist < player.radius + boss.radius) {
                            if (player.shield > 0) {
                                boss.health--;
                                player.shield = 0;
                                shakeTime = 500;
                                shakeIntensity = 15;
                                AudioEngine.playSound('explosion');
                                if (boss.health <= 0) {
                                    score += 5000;
                                    createExplosion(boss.x, boss.y, CONFIG.COLORS.boss, 100, 3);
                                    boss = null;
                                }
                            } else {
                                gameOver();
                            }
                        }
                    }

                    // Enemies Logic
                    for (let i = enemies.length - 1; i >= 0; i--) {
                        let e = enemies[i];
                        
                        // Seek player
                        const dx = player.x - e.x;
                        const dy = player.y - e.y;
                        const dist = Math.hypot(dx, dy);
                        
                        if (dist > 0) {
                            e.x += (dx / dist) * e.speed * (dt/16);
                            e.y += (dy / dist) * e.speed * (dt/16);
                        }
                        
                        e.angle += e.rotSpeed * (dt/16);

                        // Collision with player
                        // Make hitbox slightly forgiving (subtract 3)
                        if (dist < player.radius + e.radius - 3) {
                            if (player.shield > 0) {
                                // Destroy enemy and consume shield faster
                                createExplosion(e.x, e.y, CONFIG.COLORS.enemy, 15);
                                enemies.splice(i, 1);
                                player.shield -= 1000;
                                AudioEngine.playSound('explosion');
                                continue;
                            }
                            gameOver();
                            break;
                        }
                    }
                }

                // Particles Logic (always update even in gameover)
                for (let i = particles.length - 1; i >= 0; i--) {
                    let p = particles[i];
                    p.x += p.vx * (dt/16);
                    p.y += p.vy * (dt/16);
                    p.life -= p.decay * (dt/16);
                    if (p.life <= 0) {
                        particles.splice(i, 1);
                    }
                }
            }

            /**
             * ============================================
             * SECTION: JAVASCRIPT — RENDERING ENGINE
             * ============================================
             */
            function draw() {
                // Solid Background
                ctx.fillStyle = CONFIG.COLORS.bg;
                ctx.fillRect(0, 0, width, height);

                ctx.save();
                
                // Screen Shake Application
                if (shakeTime > 0) {
                    const progress = shakeTime / 600; // normalized 0-1
                    const dx = Utils.random(-shakeIntensity, shakeIntensity) * progress;
                    const dy = Utils.random(-shakeIntensity, shakeIntensity) * progress;
                    ctx.translate(dx, dy);
                }

                // Draw Grid (Cyberpunk style)
                ctx.strokeStyle = CONFIG.COLORS.grid;
                ctx.lineWidth = 1;
                const gridSize = 60;
                
                // Offset grid based on player position for parallax effect
                const offsetX = (player.x * -0.05) % gridSize;
                const offsetY = (player.y * -0.05) % gridSize;
                
                ctx.beginPath();
                for(let x = offsetX; x < width; x += gridSize) { ctx.moveTo(x, 0); ctx.lineTo(x, height); }
                for(let y = offsetY; y < height; y += gridSize) { ctx.moveTo(0, y); ctx.lineTo(width, y); }
                ctx.stroke();

                // Add bloom/glow to drawn elements
                ctx.globalCompositeOperation = 'screen';

                // Draw Particles
                particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, Math.max(0.1, p.radius * p.life), 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 10 * p.life;
                    ctx.fill();
                });

                // Draw Collectibles
                collectibles.forEach(c => {
                    const lifeRatio = c.life / c.maxLife;
                    // Blink faster as life runs out
                    const blink = lifeRatio < 0.3 ? Math.sin(performance.now() * 0.02) > 0 : true;
                    
                    if (blink) {
                        ctx.beginPath();
                        ctx.arc(c.x, c.y, c.radius, 0, Math.PI * 2);
                        ctx.fillStyle = CONFIG.COLORS.collectible;
                        ctx.shadowColor = CONFIG.COLORS.collectible;
                        ctx.shadowBlur = 15;
                        ctx.fill();
                        
                        // Outer pulse ring
                        const pulse = 1 + Math.sin(performance.now() * 0.005) * 0.3;
                        ctx.beginPath();
                        ctx.arc(c.x, c.y, c.radius * pulse * 1.8, 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(0, 255, 170, ${lifeRatio})`;
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                });

                // Draw Powerups
                powerups.forEach(p => {
                    const lifeRatio = p.life / p.maxLife;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    const rot = performance.now() * 0.005;
                    ctx.rotate(rot);
                    
                    // Diamond shape for powerups
                    ctx.beginPath();
                    ctx.moveTo(0, -p.radius * 1.5);
                    ctx.lineTo(p.radius, 0);
                    ctx.lineTo(0, p.radius * 1.5);
                    ctx.lineTo(-p.radius, 0);
                    ctx.closePath();
                    
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 15;
                    ctx.fill();
                    
                    // Glow ring
                    ctx.beginPath();
                    ctx.arc(0, 0, p.radius * 2, 0, Math.PI * 2);
                    let glowColor = '255,136,0';
                    if (p.type === 'shield') glowColor = '255,251,0';
                    else if (p.type === 'speed') glowColor = '0,255,0';
                    ctx.strokeStyle = `rgba(${glowColor}, ${lifeRatio * 0.5})`;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    ctx.restore();
                });

                // Draw Boss
                if (boss) {
                    ctx.save();
                    ctx.translate(boss.x, boss.y);
                    ctx.rotate(boss.angle);
                    ctx.beginPath();
                    for(let j=0; j<boss.vertices; j++) {
                        const a = (j / boss.vertices) * Math.PI * 2;
                        const px = Math.cos(a) * boss.radius;
                        const py = Math.sin(a) * boss.radius;
                        if(j===0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.strokeStyle = CONFIG.COLORS.boss;
                    ctx.lineWidth = 5;
                    ctx.shadowColor = CONFIG.COLORS.boss;
                    ctx.shadowBlur = 30;
                    ctx.stroke();
                    ctx.fillStyle = 'rgba(255, 0, 255, 0.2)';
                    ctx.fill();
                    
                    // Boss Health Bar
                    const healthPct = boss.health / 10;
                    ctx.restore();
                    ctx.fillStyle = 'rgba(255, 0, 255, 0.3)';
                    ctx.fillRect(boss.x - 40, boss.y - boss.radius - 20, 80, 6);
                    ctx.fillStyle = CONFIG.COLORS.boss;
                    ctx.fillRect(boss.x - 40, boss.y - boss.radius - 20, 80 * healthPct, 6);
                }
                    ctx.save();
                    ctx.translate(e.x, e.y);
                    ctx.rotate(e.angle);
                    
                    ctx.beginPath();
                    for(let j=0; j<e.vertices; j++) {
                        const a = (j / e.vertices) * Math.PI * 2;
                        const px = Math.cos(a) * e.radius;
                        const py = Math.sin(a) * e.radius;
                        if(j===0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    
                    // Throbbing effect
                    const throb = 1 + Math.sin(performance.now() * 0.01 + e.x) * 0.1;
                    ctx.scale(throb, throb);
                    
                    ctx.strokeStyle = CONFIG.COLORS.enemy;
                    ctx.lineWidth = 2.5;
                    ctx.shadowColor = CONFIG.COLORS.enemy;
                    ctx.shadowBlur = e.isDecorative ? 5 : 15;
                    ctx.stroke();
                    
                    ctx.fillStyle = CONFIG.COLORS.enemyFill;
                    ctx.fill();
                    
                    // Core point
                    ctx.beginPath();
                    ctx.arc(0, 0, 3, 0, Math.PI*2);
                    ctx.fillStyle = '#fff';
                    ctx.fill();
                    
                    ctx.restore();
                });

                // Draw Player
                if (state !== 'gameover' && state !== 'menu') {
                    // Draw tether to cursor
                    ctx.beginPath();
                    ctx.moveTo(player.x, player.y);
                    ctx.lineTo(player.targetX, player.targetY);
                    
                    // Tether fades based on distance
                    const dist = Utils.distance(player.x, player.y, player.targetX, player.targetY);
                    const tetherOpacity = Math.max(0, 0.4 - (dist / 1000));
                    
                    ctx.strokeStyle = `rgba(0, 255, 255, ${tetherOpacity})`;
                    ctx.lineWidth = 1;
                    ctx.setLineDash([5, 5]); // dashed line
                    ctx.stroke();
                    ctx.setLineDash([]); // reset

                    // Outer shield/ring
                    ctx.beginPath();
                    ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = CONFIG.COLORS.player;
                    ctx.lineWidth = 2;
                    ctx.shadowColor = CONFIG.COLORS.player;
                    ctx.shadowBlur = 20;
                    ctx.stroke();

                    // Active Shield Effect
                    if (player.shield > 0) {
                        ctx.beginPath();
                        ctx.arc(player.x, player.y, player.radius + 10, 0, Math.PI * 2);
                        ctx.strokeStyle = CONFIG.COLORS.powerupShield;
                        ctx.lineWidth = 3;
                        ctx.shadowColor = CONFIG.COLORS.powerupShield;
                        ctx.shadowBlur = 15;
                        ctx.stroke();
                        
                        // Shield hex pattern or simple arcs
                        ctx.beginPath();
                        ctx.arc(player.x, player.y, player.radius + 10, performance.now() * 0.01, performance.now() * 0.01 + 1);
                        ctx.stroke();
                    }

                    // Active Speed Effect
                    if (player.speedBoost > 0) {
                        for(let i=1; i<=3; i++) {
                            const offset = i * 10;
                            ctx.beginPath();
                            ctx.arc(player.x, player.y, player.radius + 5, 0, Math.PI * 2);
                            ctx.strokeStyle = `rgba(0, 255, 0, ${0.4 / i})`;
                            ctx.lineWidth = 2;
                            ctx.stroke();
                        }
                    }
                    
                    // Inner core
                    ctx.beginPath();
                    ctx.arc(player.x, player.y, player.radius * 0.4, 0, Math.PI * 2);
                    ctx.fillStyle = CONFIG.COLORS.playerCore;
                    ctx.shadowBlur = 10;
                    ctx.fill();
                    
                    // Rotating indicator rings
                    const time = performance.now() * 0.002;
                    ctx.save();
                    ctx.translate(player.x, player.y);
                    ctx.rotate(time);
                    ctx.beginPath();
                    ctx.arc(0, 0, player.radius * 1.5, 0, Math.PI);
                    ctx.strokeStyle = 'rgba(0, 255, 255, 0.5)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    ctx.restore();
                }

                ctx.restore();
            }

            function gameLoop(time) {
                if (!lastTime) lastTime = time;
                const dt = time - lastTime;
                lastTime = time;
                
                // Cap dt to prevent massive physics jumps when tab is backgrounded
                const cappedDt = Math.min(dt, 50);

                update(cappedDt);
                draw();

                // Always loop, even in menu, to run background animations
                animationFrameId = requestAnimationFrame(gameLoop);
            }

            return {
                init: () => {
                    resize();
                    initInput();
                    
                    // Bind UI Buttons
                    document.getElementById('playBtn').addEventListener('click', start);
                    document.getElementById('restartBtn').addEventListener('click', start);
                    document.getElementById('resumeBtn').addEventListener('click', resumeGame);
                    
                    const toMenu = () => {
                        state = 'menu';
                        showScreen('mainMenu');
                        resize(); // Respawn background decorations
                    };
                    
                    document.getElementById('quitBtn').addEventListener('click', toMenu);
                    document.getElementById('menuBtn').addEventListener('click', toMenu);
                    
                    // Start ambient menu loop
                    lastTime = performance.now();
                    animationFrameId = requestAnimationFrame(gameLoop);
                }
            };
        })();

        // ============================================
        // SECTION: INITIALIZATION
        // ============================================
        window.addEventListener('DOMContentLoaded', () => {
            Game.init();
        });
    </script>
</body>
